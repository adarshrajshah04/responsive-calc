<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="main">
        <div class="text">
            <input type="text" id="inp" placeholder="00">
        </div>
        <div class="btnmain">
            <div class="btn">
                <button onclick="btn(this)">1</button>
                <button onclick="btn(this)">2</button>
                <button onclick="btn(this)">3</button>
                <button onclick="op(this)">+</button>
            </div>
            <div class="btn">
                <button onclick="btn(this)">4</button>
                <button onclick="btn(this)">5</button>
                <button onclick="btn(this)">6</button>
                <button onclick="op(this)">-</button>
            </div>
            <div class="btn">
                <button onclick="btn(this)">7</button>
                <button onclick="btn(this)">8</button>
                <button onclick="btn(this)">9</button>
                <button onclick="op(this)">*</button>
            </div>
            <div class="btn">
                <button onclick="cle(this)">C</button>
                <button onclick="btn(this)">0</button>
                <button onclick="equal(this)">=</button>
                <button onclick="op(this)">/</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
